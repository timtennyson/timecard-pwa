<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f3a5f">
<title>Timecard — Alexander Building Co</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <strong>Timecard</strong>
    <span class="sub">Alexander Building Co · CA construction · WCIRB-coded</span>
  </div>
  <nav class="modes" role="tablist">
    <button id="modeEmployee" class="mode active" type="button" role="tab" aria-selected="true">Employee</button>
    <button id="modeForeman"  class="mode"        type="button" role="tab" aria-selected="false">Foreman</button>
  </nav>
  <div class="actions">
    <span id="saveState" class="savestate">Saved</span>
  </div>
</header>

<main id="app"></main>

<footer class="disclaimer">
  Data stays on this device until you export. Verify WCIRB class assignments
  against your State Fund policy and review OT/payroll before submission.
</footer>

<script src="vendor/xlsx.full.min.js"></script>
<script src="data/wcirb_construction.js"></script>
<script src="data/schema.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(function (reg) {
    reg.update();
    setInterval(function () { reg.update(); }, 60000);
  }).catch(function () {});
  var swReloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", function () {
    if (swReloaded) return; swReloaded = true; window.location.reload();
  });
}
</script>
</body>
</html>
